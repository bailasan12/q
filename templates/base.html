<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}قِرطاس{% endblock %}</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="{% block body_class %}{% endblock %}">

<!-- ===== Header ===== -->
<header class="header">


    <div class="banner-text">
        <h1>قِرْطاس</h1>

    </div>

    <nav class="nav">
        <a href="{{ url_for('home') }}" title="الرئيسية">
            <i class="fas fa-house"></i>
        </a>

        <a href="{{ url_for('favorites') }}" title="المفضلة">
            <i class="fas fa-heart"></i>
        </a>

        <a href="{{ url_for('cart') }}" title="السلة">
            <i class="fas fa-cart-shopping"></i>
        </a>

        <a href="{{ url_for('admin_login_page') }}" title="لوحة الإدارة">
            <i class="fas fa-user-shield"></i>
        </a>
    </nav>
</header>

<!-- ===== Main Content ===== -->
<main>
    {% block content %}
    <!-- محتوى كل صفحة سيُضاف هنا -->
    {% endblock %}
</main>

<!-- ===== Footer ===== -->
<footer class="footer">
    <div class="social-icons">

        <a href="https://www.facebook.com/share/1EhRbBV41k/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" aria-label="facebook">

        <i class="fab fa-facebook"></i>
        </a>

        <a href="https://www.instagram.com/qertas.ps?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        
        <a href="https://www.tiktok.com/@qertas.ps?_r=1&_t=ZS-97v9QAWoLQu" target="_blank" rel="noopener noreferrer" aria-label="tiktok">
            <i class="fab fa-tiktok"></i>
        </a>

                
        <a href=" https://wa.me/message/F6JAA2AQYUBOG1" target="_blank" rel="noopener noreferrer" aria-label="whatsapp">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <p>© 2026 جميع الحقوق محفوظة - Qertas.ps </p>
</footer>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- turn.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
